services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lornews}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      POSTGRES_DB: ${POSTGRES_DB:-lornews}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/backup.sh:/backup.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lornews}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M

  qdrant:
    image: qdrant/qdrant:v1.12
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: lornews-backend:${TAG:-latest}
    environment:
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY required}
      API_DEBUG: "false"
      API_LOG_LEVEL: "INFO"
      API_CORS_ORIGINS: ${API_CORS_ORIGINS:-https://dailyent.ai}
      TRUSTED_HOSTS: ${TRUSTED_HOSTS:-dailyent.ai,api.dailyent.ai}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      LLM_API_KEY: ${LLM_API_KEY:-}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-lornews}:${POSTGRES_PASSWORD:?}@postgres:5432/${POSTGRES_DB:-lornews}
      REDIS_URL: redis://redis:6379/0
      ENABLE_METRICS: "true"
      ENABLE_RATE_LIMIT: "true"
      CGA_LLM_PROVIDER: ${CGA_LLM_PROVIDER:-openai}
      CGA_LLM_MODEL: ${CGA_LLM_MODEL:-gpt-4o}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - app_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import http.client; c=http.client.HTTPConnection('localhost:8000'); c.request('GET','/api/v1/health'); r=c.getresponse(); exit(0 if r.status==200 else 1)"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G

  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
    image: lornews-frontend:${TAG:-latest}
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  backup:
    image: alpine:latest
    restart: unless-stopped
    volumes:
      - postgres_data:/data/postgres:ro
      - qdrant_data:/data/qdrant:ro
      - app_data:/data/app:ro
      - backup_data:/backup
    entrypoint: |
      sh -c "
      apk add --no-cache postgresql-client aws-cli > /dev/null 2>&1
      echo '0 4 * * * /backup.sh' > /etc/crontabs/root
      crond -f
      "
    environment:
      PGHOST: postgres
      PGUSER: ${POSTGRES_USER:-lornews}
      PGPASSWORD: ${POSTGRES_PASSWORD:?}
      PGDATABASE: ${POSTGRES_DB:-lornews}
      BACKUP_RETENTION_DAYS: 30
      S3_BUCKET: ${S3_BUCKET:-}
      S3_PREFIX: ${S3_PREFIX:-lornews-backups}

  # Optional: monitoring stack
  prometheus:
    image: prom/prometheus:v2.53
    profiles: [monitoring]
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  grafana:
    image: grafana/grafana:11.0
    profiles: [monitoring]
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana-dashboard.json:/etc/grafana/provisioning/dashboards/dashboard.json:ro
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-lornews}
      GF_INSTALL_PLUGINS: ""
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  app_data:
  backup_data:
  caddy_data:
  prometheus_data:
  grafana_data:
