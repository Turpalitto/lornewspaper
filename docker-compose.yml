services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lornews}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lornews}
      POSTGRES_DB: ${POSTGRES_DB:-lornews}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lornews}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.12
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: lornews-backend:latest
    environment:
      API_DEBUG: "${API_DEBUG:-false}"
      API_LOG_LEVEL: "${API_LOG_LEVEL:-INFO}"
      API_CORS_ORIGINS: "${API_CORS_ORIGINS:-*}"
      LLM_API_KEY: "${LLM_API_KEY:-}"
      LLM_PROVIDER: "${LLM_PROVIDER:-ollama}"
      LLM_MODEL: "${LLM_MODEL:-}"
      LLM_BASE_URL: "${LLM_BASE_URL:-http://ollama:11434}"
      KB_DATABASE_PATH: /app/data/knowledge_base.db
      KB_VECTOR_PERSIST_DIR: /app/data/vector_store
      DOWNLOAD_DIR: /app/data/downloads
      REDIS_URL: "${REDIS_URL:-redis://redis:6379/0}"
      DATABASE_URL: "${DATABASE_URL:-postgresql+asyncpg://lornews:lornews@postgres:5432/lornews}"
      SECRET_KEY: "${SECRET_KEY:-change-me-in-production}"
      TRUSTED_HOSTS: "${TRUSTED_HOSTS:-*}"
      ENABLE_METRICS: "${ENABLE_METRICS:-true}"
      ENABLE_RATE_LIMIT: "${ENABLE_RATE_LIMIT:-true}"
      RATE_LIMIT_PER_MINUTE: "${RATE_LIMIT_PER_MINUTE:-60}"
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - app_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import http.client; c=http.client.HTTPConnection('localhost:8000'); c.request('GET','/api/v1/health'); r=c.getresponse(); exit(0 if r.status==200 else 1)"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 3
    restart: unless-stopped

  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
    image: lornews-frontend:latest
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: 1
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/v1/health"]
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    profiles:
      - optional
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  app_data:
  ollama_data:
