# Prometheus configuration for LORNEWS production monitoring
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'lornews-backend'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['backend:8000']
        labels:
          service: 'backend'

  - job_name: 'lornews-frontend'
    metrics_path: '/api/v1/health'
    static_configs:
      - targets: ['frontend:3000']
        labels:
          service: 'frontend'

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres:5432']
        labels:
          service: 'postgres'

  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
        labels:
          service: 'redis'

  - job_name: 'qdrant'
    metrics_path: '/healthz'
    static_configs:
      - targets: ['qdrant:6333']
        labels:
          service: 'qdrant'

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - 'alerts.yml'
